<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Mon programme • Bravoo</title>
  <!--
    ⚙️ SUPABASE & STRIPE CONFIG
    
    1. Supabase:
       - auth.users → prenom (user_metadata.first_name)
       - table: progression (user_id, matiere, score, notions_maitrisees, total_notions)
       - table: compte (user_id, objectif_note, moyenne_actuelle)
    
    2. Stripe:
       - Free tier: accès au coach preview
       - Premium tier: coach illimité + fonctionnalités avancées
    
    3. localStorage fallback (mode actuel):
       - userData.firstName
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; background: #121212; color: #FFFFFF; overflow: hidden; }
    
    .shell {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #121212;
    }
    
    /* Header */
    .header {
      flex-shrink: 0;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-logo {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #1DB954;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .header-text h1 {
      font-size: 17px;
      font-weight: 900;
      color: #FFFFFF;
    }
    .header-text p {
      font-size: 12px;
      font-weight: 600;
      color: #B3B3B3;
      margin-top: 2px;
    }
    
    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px 80px 16px;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }
    
    /* Message bubbles */
    .msg-coach {
      max-width: 85%;
      margin-bottom: 12px;
    }
    .msg-user {
      max-width: 80%;
      margin-left: auto;
      margin-bottom: 12px;
    }
    
    .bubble-coach {
      background: #181818;
      border-radius: 16px;
      border-top-left-radius: 4px;
      padding: 14px 16px;
      color: #FFFFFF;
      font-size: 14px;
      line-height: 1.6;
      font-weight: 500;
      word-wrap: break-word;
      overflow-wrap: break-word;
      max-width: 100%;
    }
    
    .bubble-user {
      background: #1DB954;
      border-radius: 16px;
      border-top-right-radius: 4px;
      padding: 10px 16px;
      color: #FFFFFF;
      font-size: 14px;
      font-weight: 700;
      text-align: right;
      word-wrap: break-word;
      overflow-wrap: break-word;
      max-width: 100%;
    }
    
    /* Course block */
    .course-block {
      background: #181818;
      border-radius: 16px;
      border-top-left-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
      max-width: 85%;
    }
    .course-header {
      padding: 12px 16px;
      background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
      color: #FFFFFF;
      font-weight: 800;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .course-body {
      padding: 14px 16px;
    }
    .course-bullet {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.5;
      font-weight: 500;
      color: #FFFFFF;
    }
    .course-bullet:last-child { margin-bottom: 0; }
    .course-bullet-dot {
      color: #1DB954;
      font-weight: 900;
      font-size: 16px;
      line-height: 1.3;
      flex-shrink: 0;
    }
    
    /* Quiz block */
    .quiz-block {
      background: #181818;
      border-radius: 16px;
      border-top-left-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
      max-width: 85%;
    }
    .quiz-header {
      padding: 12px 16px;
      background: rgba(29,185,84,0.15);
      color: #1DB954;
      font-weight: 800;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .quiz-body {
      padding: 14px 16px;
    }
    .quiz-question {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 12px;
      line-height: 1.5;
      color: #FFFFFF;
    }
    .quiz-choices {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .quiz-choice {
      padding: 11px 14px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      font-size: 13px;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .quiz-choice:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.2);
    }
    .quiz-choice.correct {
      background: rgba(34,197,94,0.15);
      border-color: #22c55e;
    }
    .quiz-choice.wrong {
      background: rgba(239,68,68,0.15);
      border-color: #ef4444;
    }
    .quiz-choice.disabled {
      cursor: default;
    }
    .quiz-letter {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(29,185,84,0.2);
      color: #1DB954;
      font-size: 12px;
      font-weight: 900;
      flex-shrink: 0;
    }
    .quiz-choice.correct .quiz-letter {
      background: #22c55e;
      color: #FFFFFF;
    }
    .quiz-choice.wrong .quiz-letter {
      background: #ef4444;
      color: #FFFFFF;
    }
    .quiz-explanation {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
    }
    .quiz-explanation.correct {
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.3);
      color: #FFFFFF;
    }
    .quiz-explanation.wrong {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #FFFFFF;
    }
    
    /* Flashcards block */
    .flashcards-block {
      background: #181818;
      border-radius: 16px;
      border-top-left-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
      max-width: 85%;
    }
    .flashcards-header {
      padding: 10px 16px;
      background: rgba(245,197,24,0.15);
      color: #F5C518;
      font-weight: 800;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .flashcard-container {
      padding: 28px 20px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      transition: all 0.3s;
    }
    .flashcard-container.front {
      background: rgba(29,185,84,0.1);
      color: #FFFFFF;
    }
    .flashcard-container.back {
      background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
      color: #FFFFFF;
    }
    .flashcards-nav {
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .flashcards-nav button {
      background: none;
      border: none;
      color: #1DB954;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      padding: 4px;
    }
    .flashcards-nav button:disabled {
      color: rgba(255,255,255,0.2);
      cursor: default;
    }
    .flashcards-nav .hint {
      font-size: 11px;
      color: #B3B3B3;
      font-weight: 600;
    }
    
    /* Bottom controls */
    .bottom-controls {
      flex-shrink: 0;
      background: #121212;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    
    /* Action buttons */
    .action-buttons {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      max-width: 600px;
      margin: 0 auto;
    }
    .action-btn {
      flex: 1;
      padding: 13px 12px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.1s;
    }
    .action-btn:active {
      transform: scale(0.98);
    }
    .action-btn.primary {
      background: #1DB954;
      color: #FFFFFF;
    }
    .action-btn.secondary {
      background: #181818;
      color: #FFFFFF;
      border: 2px solid rgba(255,255,255,0.15);
    }
    .action-btn.secondary:hover {
      background: #282828;
      border-color: rgba(255,255,255,0.25);
    }
    
    /* Quick actions */
    .quick-actions {
      padding: 8px 16px;
      display: flex;
      gap: 12px;
      justify-content: center;
      max-width: 600px;
      margin: 0 auto;
    }
    .quick-action {
      background: none;
      border: none;
      color: #B3B3B3;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: inherit;
    }
    
    /* Bottom nav */
    .bottom-nav-wrap {
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
    }
    .bottom-nav {
      max-width: 600px;
      margin: 0 auto;
      background: #181818;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 6px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 54px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 11px;
      font-weight: 800;
      padding: 6px 4px;
      transition: all 0.2s;
    }
    .nav-item.active {
      background: #1DB954;
      color: #FFFFFF;
    }
    .nav-item:not(.active) {
      color: #B3B3B3;
    }
    .nav-icon {
      width: 26px;
      height: 26px;
      border-radius: 9px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 900;
    }
    .nav-item.active .nav-icon {
      background: rgba(255,255,255,0.2);
    }
    .nav-item:not(.active) .nav-icon {
      background: rgba(255,255,255,0.05);
    }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Header -->
    <div class="header">
      <div class="header-logo">🎓</div>
      <div class="header-text">
        <h1>Mon programme</h1>
        <p id="greetingText">Salut !</p>
      </div>
    </div>
    
    <!-- Chat area -->
    <div class="chat-area" id="chatArea">
      <!-- Messages will be injected here -->
    </div>
    
    <!-- Bottom controls -->
    <div class="bottom-controls">
      <!-- Action buttons (hidden initially) -->
      <div class="action-buttons hidden" id="actionButtons">
        <button class="action-btn primary" id="actionBtn1"></button>
        <button class="action-btn secondary" id="actionBtn2"></button>
      </div>
      
      <!-- Quick actions -->
      <div class="quick-actions">
        <button class="quick-action" id="questionBtn">💬 Poser une question</button>
        <button class="quick-action" id="skipBtn">⏭️ Passer à autre chose</button>
      </div>
      
      <!-- Bottom nav -->
      <div class="bottom-nav-wrap">
        <div class="bottom-nav">
          <a href="dashboard.html" class="nav-item active">
            <span class="nav-icon">🎯</span>
            <span>Mon programme</span>
          </a>
          <a href="progression.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span>Ma progression</span>
          </a>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // Get user data
    const userData = JSON.parse(localStorage.getItem('userData') || '{}');
    const prenom = userData.firstName || 'toi';
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Bon matin' : hour < 18 ? 'Salut' : 'Bonsoir';
    document.getElementById('greetingText').textContent = `${greeting} ${prenom} !`;
    
    // Chat messages data
    const messages = [
      {
        type: 'coach-text',
        content: `Salut ${prenom} ! Aujourd'hui on travaille sur les équations du 1er degré. C'est une notion clé pour le brevet. On y va ?`
      },
      {
        type: 'action',
        options: ['C\'est parti ! 🚀', 'Autre chose']
      },
      {
        type: 'user',
        content: 'C\'est parti ! 🚀'
      },
      {
        type: 'course',
        title: '📐 Les équations du 1er degré',
        bullets: [
          'Une équation c\'est une égalité avec une inconnue (x)',
          'Pour résoudre : on isole x en faisant la même opération des deux côtés',
          'Exemple : 2x + 3 = 7 → 2x = 4 → x = 2',
          'Toujours vérifier : 2(2) + 3 = 7 ✓'
        ]
      },
      {
        type: 'quiz',
        question: 'Résous : 3x - 6 = 9',
        choices: ['x = 1', 'x = 3', 'x = 5', 'x = 15'],
        correctIndex: 2,
        explanation: '3x = 9 + 6 = 15, donc x = 15/3 = 5'
      },
      {
        type: 'flashcards',
        cards: [
          { front: 'Qu\'est-ce qu\'une équation ?', back: 'Une égalité contenant une inconnue à déterminer' },
          { front: 'Comment résoudre 5x = 20 ?', back: 'On divise des deux côtés par 5 : x = 4' },
          { front: 'Que signifie "vérifier" une équation ?', back: 'Remplacer x par la valeur trouvée et vérifier que l\'égalité est vraie' }
        ]
      },
      {
        type: 'coach-text',
        content: 'Bravo ! Tu as bien compris les bases. On continue avec des exercices plus durs ou tu veux revoir quelque chose ?'
      },
      {
        type: 'action',
        options: ['Exercices avancés 💪', 'Revoir les bases']
      },
      {
        type: 'coach-text',
        content: 'Le coach IA sera disponible très bientôt ! En attendant, voici un aperçu de ton expérience. 😊'
      }
    ];
    
    // Render messages
    const chatArea = document.getElementById('chatArea');
    
    messages.forEach((msg, idx) => {
      if (msg.type === 'coach-text') {
        const div = document.createElement('div');
        div.className = 'msg-coach';
        div.innerHTML = `<div class="bubble-coach">${msg.content}</div>`;
        chatArea.appendChild(div);
      }
      else if (msg.type === 'user') {
        const div = document.createElement('div');
        div.className = 'msg-user';
        div.innerHTML = `<div class="bubble-user">${msg.content}</div>`;
        chatArea.appendChild(div);
      }
      else if (msg.type === 'course') {
        const div = document.createElement('div');
        div.className = 'msg-coach';
        const bulletsHTML = msg.bullets.map(b => 
          `<div class="course-bullet"><span class="course-bullet-dot">•</span><span>${b}</span></div>`
        ).join('');
        div.innerHTML = `
          <div class="course-block">
            <div class="course-header">${msg.title}</div>
            <div class="course-body">${bulletsHTML}</div>
          </div>
        `;
        chatArea.appendChild(div);
      }
      else if (msg.type === 'quiz') {
        const div = document.createElement('div');
        div.className = 'msg-coach';
        const choicesHTML = msg.choices.map((choice, i) => 
          `<div class="quiz-choice" data-index="${i}">
            <span class="quiz-letter">${String.fromCharCode(65 + i)}</span>
            <span>${choice}</span>
          </div>`
        ).join('');
        div.innerHTML = `
          <div class="quiz-block">
            <div class="quiz-header">❓ Quiz</div>
            <div class="quiz-body">
              <div class="quiz-question">${msg.question}</div>
              <div class="quiz-choices">${choicesHTML}</div>
            </div>
          </div>
        `;
        chatArea.appendChild(div);
        
        // Add quiz interaction
        let answered = false;
        const choices = div.querySelectorAll('.quiz-choice');
        const quizBody = div.querySelector('.quiz-body');
        choices.forEach((choice, i) => {
          choice.addEventListener('click', () => {
            if (answered) return;
            answered = true;
            const isCorrect = i === msg.correctIndex;
            
            choices.forEach((c, j) => {
              c.classList.add('disabled');
              if (j === msg.correctIndex) c.classList.add('correct');
              else if (j === i) c.classList.add('wrong');
            });
            
            const explanation = document.createElement('div');
            explanation.className = `quiz-explanation ${isCorrect ? 'correct' : 'wrong'}`;
            explanation.textContent = (isCorrect ? 'Bien joué ! ' : 'Pas tout à fait. ') + msg.explanation;
            quizBody.appendChild(explanation);
          });
        });
      }
      else if (msg.type === 'flashcards') {
        const div = document.createElement('div');
        div.className = 'msg-coach';
        div.innerHTML = `
          <div class="flashcards-block">
            <div class="flashcards-header">
              <span>🃏 Flashcards</span>
              <span class="card-counter">1/${msg.cards.length}</span>
            </div>
            <div class="flashcard-container front">${msg.cards[0].front}</div>
            <div class="flashcards-nav">
              <button class="prev-btn" disabled>← Précédent</button>
              <span class="hint">Tape pour retourner</span>
              <button class="next-btn">Suivant →</button>
            </div>
          </div>
        `;
        chatArea.appendChild(div);
        
        // Add flashcard interaction
        let currentIndex = 0;
        let flipped = false;
        const container = div.querySelector('.flashcard-container');
        const counter = div.querySelector('.card-counter');
        const prevBtn = div.querySelector('.prev-btn');
        const nextBtn = div.querySelector('.next-btn');
        
        function updateCard() {
          const card = msg.cards[currentIndex];
          container.textContent = flipped ? card.back : card.front;
          container.className = `flashcard-container ${flipped ? 'back' : 'front'}`;
          counter.textContent = `${currentIndex + 1}/${msg.cards.length}`;
          prevBtn.disabled = currentIndex === 0;
          nextBtn.disabled = currentIndex === msg.cards.length - 1;
        }
        
        container.addEventListener('click', () => {
          flipped = !flipped;
          updateCard();
        });
        
        prevBtn.addEventListener('click', () => {
          if (currentIndex > 0) {
            currentIndex--;
            flipped = false;
            updateCard();
          }
        });
        
        nextBtn.addEventListener('click', () => {
          if (currentIndex < msg.cards.length - 1) {
            currentIndex++;
            flipped = false;
            updateCard();
          }
        });
      }
      else if (msg.type === 'action') {
        // Store for bottom buttons
        if (idx === messages.length - 2) { // "Exercices avancés" action
          setTimeout(() => {
            const actionButtons = document.getElementById('actionButtons');
            const btn1 = document.getElementById('actionBtn1');
            const btn2 = document.getElementById('actionBtn2');
            btn1.textContent = msg.options[0];
            btn2.textContent = msg.options[1];
            actionButtons.classList.remove('hidden');
          }, 100);
        }
      }
    });
    
    // Quick actions
    document.getElementById('questionBtn').addEventListener('click', () => {
      alert('Le coach IA sera disponible très bientôt !');
    });
    
    document.getElementById('skipBtn').addEventListener('click', () => {
      alert('Le coach IA sera disponible très bientôt !');
    });
    
    // Action buttons
    document.getElementById('actionBtn1').addEventListener('click', () => {
      alert('Le coach IA sera disponible très bientôt !');
    });
    
    document.getElementById('actionBtn2').addEventListener('click', () => {
      alert('Le coach IA sera disponible très bientôt !');
    });
    
    // Auto-scroll to bottom
    setTimeout(() => {
      chatArea.scrollTop = chatArea.scrollHeight;
    }, 100);
  </script>
</body>
</html>
