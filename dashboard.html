<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Mon coaching - Bravoo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #121212;
      --bg-card: #181818;
      --bg-card-hover: #1e1e1e;
      --green: #1DB954;
      --green-dim: rgba(29, 185, 84, 0.15);
      --gold: #F5C518;
      --white: #FFFFFF;
      --gray: #B3B3B3;
      --gray-dim: #535353;
      --red: #ff4757;
      --red-dim: rgba(255, 71, 87, 0.15);
      --blue: #4A90D9;
      --blue-dim: rgba(74, 144, 217, 0.15);
    }
    
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(18, 18, 18, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--green); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .streak-badge {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .streak-fire { color: #FF6B35; }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 15px;
      color: var(--bg);
    }

    /* ===== MAIN ===== */
    .main {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 20px 100px;
    }

    /* ===== SALUTATION ===== */
    .salutation {
      margin-bottom: 28px;
    }
    .salutation h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .salutation p {
      color: var(--gray);
      font-size: 15px;
      line-height: 1.5;
    }

    /* ===== SESSION CARD ===== */
    .session-card {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .session-header {
      background: linear-gradient(135deg, var(--green), #15803d);
      padding: 20px 24px;
    }
    .session-tag {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .session-title {
      font-size: 20px;
      font-weight: 800;
      color: white;
      margin-bottom: 6px;
    }
    .session-meta {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      display: flex;
      gap: 16px;
    }
    .session-body {
      padding: 24px;
    }
    .session-body p {
      color: var(--gray);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .session-body h3 {
      color: var(--white);
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
      margin-top: 8px;
    }
    .points-cles {
      list-style: none;
      margin-bottom: 20px;
    }
    .points-cles li {
      padding: 10px 16px;
      background: var(--green-dim);
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .points-cles li::before {
      content: '\2713';
      font-weight: 800;
      font-size: 14px;
    }

    /* ===== QUIZ ===== */
    .quiz-section {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .quiz-header h2 {
      font-size: 18px;
      font-weight: 800;
    }
    .quiz-progress {
      font-size: 13px;
      color: var(--gray);
      font-weight: 600;
    }
    .quiz-question {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .quiz-option {
      background: var(--bg);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 500;
      color: var(--white);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .quiz-option:hover {
      border-color: var(--green);
      background: var(--green-dim);
    }
    .quiz-option.correct {
      border-color: var(--green);
      background: var(--green-dim);
      color: var(--green);
    }
    .quiz-option.wrong {
      border-color: var(--red);
      background: var(--red-dim);
      color: var(--red);
    }
    .quiz-option.disabled {
      pointer-events: none;
      opacity: 0.5;
    }
    .quiz-explication {
      margin-top: 14px;
      padding: 14px 18px;
      background: var(--blue-dim);
      border-radius: 12px;
      color: var(--blue);
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }
    .quiz-explication.show { display: block; }
    .quiz-next {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: none;
    }
    .quiz-next.show { display: block; }
    .quiz-next:hover { opacity: 0.9; }

    /* ===== RESULT ===== */
    .quiz-result {
      text-align: center;
      padding: 40px 20px;
      display: none;
    }
    .quiz-result.show { display: block; }
    .result-score {
      font-size: 56px;
      font-weight: 900;
      color: var(--green);
      margin-bottom: 8px;
    }
    .result-text {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .result-detail {
      color: var(--gray);
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* ===== CONSEIL ===== */
    .conseil-card {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .conseil-card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .conseil-card p {
      color: var(--gray);
      font-size: 14px;
      line-height: 1.6;
    }
    .next-session {
      background: var(--green-dim);
      border: 1px solid rgba(29, 185, 84, 0.2);
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 14px;
      font-size: 14px;
      color: var(--green);
      font-weight: 600;
    }

    /* ===== LOADING ===== */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--bg-card);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .loading-sub {
      color: var(--gray);
      font-size: 14px;
    }
    .loading-messages {
      margin-top: 20px;
      color: var(--gray);
      font-size: 13px;
      min-height: 20px;
    }

    /* ===== ERROR ===== */
    .error-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 40px 20px;
    }
    .error-screen h2 { margin-bottom: 12px; }
    .error-screen p { color: var(--gray); margin-bottom: 24px; font-size: 15px; }
    .retry-btn {
      padding: 14px 32px;
      background: var(--green);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(18, 18, 18, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-around;
      padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-dim);
      text-decoration: none;
      padding: 4px 16px;
    }
    .nav-item.active { color: var(--green); }
    .nav-icon { font-size: 22px; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Brav<span>oo</span></div>
    <div class="header-right">
      <div class="streak-badge">
        <span class="streak-fire">&#x1F525;</span>
        <span id="streakCount">1</span> jour
      </div>
      <div class="avatar" id="avatarInitial">?</div>
    </div>
  </div>

  <!-- LOADING -->
  <div class="main">
    <div id="loadingScreen" class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">Preparation de ta session...</div>
      <div class="loading-sub">L'IA analyse ton profil</div>
      <div class="loading-messages" id="loadingMsg"></div>
    </div>

    <!-- ERROR -->
    <div id="errorScreen" class="error-screen">
      <h2>Oups !</h2>
      <p>Le coach IA est momentanement indisponible. Reessaie dans quelques secondes.</p>
      <button class="retry-btn" onclick="loadSession()">Reessayer</button>
    </div>

    <!-- CONTENT (hidden until loaded) -->
    <div id="contentScreen" style="display:none;">
      
      <!-- Salutation -->
      <div class="salutation">
        <h1 id="salutationTitle"></h1>
        <p id="salutationText"></p>
      </div>

      <!-- Session / Lecon -->
      <div class="session-card">
        <div class="session-header">
          <div class="session-tag">Session du jour</div>
          <div class="session-title" id="leconTitre"></div>
          <div class="session-meta">
            <span id="leconMatiere"></span>
            <span id="leconDuree"></span>
          </div>
        </div>
        <div class="session-body">
          <div id="leconContenu"></div>
          <h3>A retenir</h3>
          <ul class="points-cles" id="pointsCles"></ul>
        </div>
      </div>

      <!-- Quiz -->
      <div class="quiz-section" id="quizSection">
        <div class="quiz-header">
          <h2>Quiz</h2>
          <span class="quiz-progress" id="quizProgress">1/5</span>
        </div>
        <div class="quiz-question" id="quizQuestion"></div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-explication" id="quizExplication"></div>
        <button class="quiz-next" id="quizNext" onclick="nextQuestion()">Question suivante</button>
      </div>

      <!-- Quiz Result -->
      <div class="quiz-result" id="quizResult">
        <div class="result-score" id="resultScore"></div>
        <div class="result-text" id="resultText"></div>
        <div class="result-detail" id="resultDetail"></div>
      </div>

      <!-- Conseil -->
      <div class="conseil-card" id="conseilCard">
        <h3>&#x1F4A1; Conseil du coach</h3>
        <p id="conseilText"></p>
        <div class="next-session" id="nextSession"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
      <span class="nav-icon">&#x1F3AF;</span>
      Coaching
    </a>
    <a href="progression.html" class="nav-item">
      <span class="nav-icon">&#x1F4CA;</span>
      Progres
    </a>
    <a href="#" class="nav-item" onclick="loadSession(); return false;">
      <span class="nav-icon">&#x1F504;</span>
      Nouvelle session
    </a>
  </nav>

  <script>
    // ===== USER DATA FROM ONBOARDING =====
    const userData = JSON.parse(localStorage.getItem('bravooUser') || '{}');
    const prenom = userData.firstName || userData.prenom || 'Ami(e)';
    const situation = userData.situation || userData.parcours || 'Brevet';
    const niveau = userData.niveau || 'moyen';
    const objectif = userData.objectif || 'reussir mon examen';

    // Set avatar
    document.getElementById('avatarInitial').textContent = prenom.charAt(0).toUpperCase();
    
    // Streak from localStorage
    const today = new Date().toDateString();
    let streak = JSON.parse(localStorage.getItem('bravooStreak') || '{"count":0,"lastDate":""}');
    if (streak.lastDate === today) {
      // Already visited today
    } else if (streak.lastDate === new Date(Date.now() - 86400000).toDateString()) {
      streak.count++;
      streak.lastDate = today;
    } else {
      streak.count = 1;
      streak.lastDate = today;
    }
    localStorage.setItem('bravooStreak', JSON.stringify(streak));
    document.getElementById('streakCount').textContent = streak.count;

    // ===== QUIZ STATE =====
    let quizData = [];
    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    // ===== LOADING MESSAGES =====
    const loadingMessages = [
      'Analyse de ton profil...',
      'Identification de tes points faibles...',
      'Selection de la meilleure lecon pour toi...',
      'Preparation du quiz personnalise...',
      'Ta session est presque prete !'
    ];

    function animateLoading() {
      let i = 0;
      const msgEl = document.getElementById('loadingMsg');
      const interval = setInterval(() => {
        if (i < loadingMessages.length) {
          msgEl.textContent = loadingMessages[i];
          i++;
        } else {
          clearInterval(interval);
        }
      }, 1500);
      return interval;
    }

    // ===== LOAD SESSION =====
    async function loadSession() {
      document.getElementById('loadingScreen').style.display = 'flex';
      document.getElementById('errorScreen').style.display = 'none';
      document.getElementById('contentScreen').style.display = 'none';
      
      const loadingInterval = animateLoading();

      try {
        const systemPrompt = `Tu es le coach IA de Bravoo, une application de coaching scolaire personnalise.

TON ROLE :
- Tu es un prof particulier bienveillant, encourageant et structure
- Tu tutoies l'eleve, tu es chaleureux mais professionnel
- Tu adaptes ton niveau de langage a l'eleve (college = simple, lycee = plus pousse)
- Tu donnes des explications claires avec des exemples concrets du programme officiel francais

FORMAT DE REPONSE (JSON strict) :
{
  "salutation": "Message personnalise pour l'eleve (1-2 phrases motivantes)",
  "lecon": {
    "titre": "Titre de la lecon du jour",
    "matiere": "La matiere",
    "duree": "15 min",
    "contenu": "Explication complete de la notion (400-600 mots). Claire, structuree, avec exemples. Utilise des paragraphes courts separes par des sauts de ligne. Adapte au niveau de l'eleve.",
    "points_cles": ["Point 1", "Point 2", "Point 3", "Point 4"]
  },
  "quiz": [
    {"question": "Q1", "options": ["A) ...", "B) ...", "C) ...", "D) ..."], "reponse": "A", "explication": "..."},
    {"question": "Q2", "options": ["A) ...", "B) ...", "C) ...", "D) ..."], "reponse": "B", "explication": "..."},
    {"question": "Q3", "options": ["A) ...", "B) ...", "C) ...", "D) ..."], "reponse": "C", "explication": "..."},
    {"question": "Q4", "options": ["A) ...", "B) ...", "C) ...", "D) ..."], "reponse": "D", "explication": "..."},
    {"question": "Q5", "options": ["A) ...", "B) ...", "C) ...", "D) ..."], "reponse": "A", "explication": "..."}
  ],
  "conseil": "Un conseil personnalise pour progresser (2-3 phrases)",
  "prochaine_session": "Apercu de ce qu'on fera demain (1 phrase)"
}

REGLES :
- Le contenu doit etre PERTINENT pour le programme officiel francais
- Les questions du quiz doivent etre progressives (facile -> difficile)
- Chaque question a exactement 4 options
- Reponds UNIQUEMENT en JSON valide, rien d'autre`;

        const userPrompt = `Profil de l'eleve :
- Prenom : ${prenom}
- Situation : ${situation}
- Niveau auto-evalue : ${niveau}
- Objectif : ${objectif}
- Matiere demandee : ${userData.matiere || 'la matiere la plus importante pour son examen'}
${localStorage.getItem('bravooLastSession') ? '- Derniere lecon : ' + localStorage.getItem('bravooLastSession') : '- Premiere session'}

Genere une session de coaching complete pour aujourd'hui.`;

        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer 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',
            'Content-Type': 'application/json',
            'HTTP-Referer': 'https://app.bravoo.fr',
            'X-Title': 'Bravoo Coach IA'
          },
          body: JSON.stringify({
            model: 'openai/gpt-4.1-mini',
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: userPrompt }
            ],
            max_tokens: 2000,
            temperature: 0.7,
            response_format: { type: 'json_object' }
          })
        });

        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        
        if (data.error) throw new Error(data.error.message);
        
        const session = JSON.parse(data.choices[0].message.content);
        
        clearInterval(loadingInterval);
        
        // Store for next session context
        localStorage.setItem('bravooLastSession', session.lecon?.titre || '');
        
        renderSession(session);
      } catch (err) {
        clearInterval(loadingInterval);
        console.error('Failed to load session:', err);
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('errorScreen').style.display = 'flex';
      }
    }

    // ===== RENDER SESSION =====
    function renderSession(session) {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('contentScreen').style.display = 'block';

      // Salutation
      document.getElementById('salutationTitle').textContent = `Salut ${prenom} !`;
      document.getElementById('salutationText').textContent = session.salutation || 'Ta session du jour est prete. C\'est parti !';

      // Lecon
      document.getElementById('leconTitre').textContent = session.lecon?.titre || 'Lecon du jour';
      document.getElementById('leconMatiere').textContent = session.lecon?.matiere || situation;
      document.getElementById('leconDuree').textContent = session.lecon?.duree || '15 min';
      
      // Render contenu with paragraphs
      const contenu = session.lecon?.contenu || '';
      const paragraphs = contenu.split('\n').filter(p => p.trim());
      document.getElementById('leconContenu').innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');

      // Points cles
      const pointsCles = session.lecon?.points_cles || [];
      document.getElementById('pointsCles').innerHTML = pointsCles.map(p => `<li>${p}</li>`).join('');

      // Quiz
      quizData = session.quiz || [];
      currentQuestion = 0;
      score = 0;
      if (quizData.length > 0) {
        document.getElementById('quizSection').style.display = 'block';
        document.getElementById('quizResult').style.display = 'none';
        renderQuestion();
      } else {
        document.getElementById('quizSection').style.display = 'none';
      }

      // Conseil
      document.getElementById('conseilText').textContent = session.conseil || '';
      document.getElementById('nextSession').textContent = session.prochaine_session ? `Demain : ${session.prochaine_session}` : 'A demain pour une nouvelle session !';
    }

    // ===== QUIZ LOGIC =====
    function renderQuestion() {
      if (currentQuestion >= quizData.length) {
        showResult();
        return;
      }

      answered = false;
      const q = quizData[currentQuestion];
      document.getElementById('quizProgress').textContent = `${currentQuestion + 1}/${quizData.length}`;
      document.getElementById('quizQuestion').textContent = q.question;
      document.getElementById('quizExplication').classList.remove('show');
      document.getElementById('quizNext').classList.remove('show');

      const optionsEl = document.getElementById('quizOptions');
      optionsEl.innerHTML = q.options.map((opt, i) => {
        const letter = String.fromCharCode(65 + i);
        return `<button class="quiz-option" onclick="selectAnswer('${letter}', this)">${opt}</button>`;
      }).join('');
    }

    function selectAnswer(letter, el) {
      if (answered) return;
      answered = true;

      const q = quizData[currentQuestion];
      const correct = q.reponse.charAt(0).toUpperCase();
      const options = document.querySelectorAll('.quiz-option');
      
      options.forEach((opt, i) => {
        const optLetter = String.fromCharCode(65 + i);
        if (optLetter === correct) {
          opt.classList.add('correct');
        }
        if (opt === el && letter !== correct) {
          opt.classList.add('wrong');
        }
        opt.classList.add('disabled');
      });

      if (letter === correct) score++;

      // Show explanation
      const expEl = document.getElementById('quizExplication');
      expEl.textContent = q.explication || '';
      expEl.classList.add('show');

      // Show next button
      document.getElementById('quizNext').classList.add('show');
      document.getElementById('quizNext').textContent = 
        currentQuestion === quizData.length - 1 ? 'Voir mes resultats' : 'Question suivante';
    }

    function nextQuestion() {
      currentQuestion++;
      renderQuestion();
    }

    function showResult() {
      document.getElementById('quizSection').style.display = 'none';
      const resultEl = document.getElementById('quizResult');
      resultEl.style.display = 'block';
      resultEl.classList.add('show');

      const pct = Math.round((score / quizData.length) * 100);
      document.getElementById('resultScore').textContent = `${pct}%`;
      
      let text, detail;
      if (pct >= 80) {
        text = 'Excellent !';
        detail = `${score}/${quizData.length} bonnes reponses. Tu maitrises bien cette notion !`;
      } else if (pct >= 60) {
        text = 'Bien joue !';
        detail = `${score}/${quizData.length} bonnes reponses. Continue comme ca, tu progresses !`;
      } else {
        text = 'On continue !';
        detail = `${score}/${quizData.length} bonnes reponses. Pas de souci, on va retravailler ca ensemble.`;
      }
      
      document.getElementById('resultText').textContent = text;
      document.getElementById('resultDetail').textContent = detail;
    }

    // ===== INIT =====
    loadSession();
  </script>
</body>
</html>
