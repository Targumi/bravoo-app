<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Ma progression • Bravoo</title>
  <!--
    ⚙️ SUPABASE & STRIPE CONFIG
    
    1. Supabase:
       - auth.users → prenom (user_metadata.first_name)
       - table: progression (user_id, matiere, score, notions_maitrisees, total_notions)
       - table: compte (user_id, objectif_note, moyenne_actuelle)
    
    2. Stripe:
       - Free tier: accès au coach preview
       - Premium tier: coach illimité + fonctionnalités avancées
    
    3. localStorage fallback (mode actuel):
       - userData.firstName
       - userData.goal (objectif)
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; background: #121212; color: #FFFFFF; overflow: hidden; }
    
    .shell {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #121212;
    }
    
    /* Header */
    .header {
      flex-shrink: 0;
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header h1 {
      font-size: 20px;
      font-weight: 900;
      color: #FFFFFF;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 13px;
      font-weight: 600;
      color: #B3B3B3;
    }
    
    /* Content area */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }
    
    /* Score circle */
    .score-section {
      text-align: center;
      margin-bottom: 24px;
    }
    .score-circle-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .score-circle-wrap svg {
      position: absolute;
      top: 0;
      left: 0;
    }
    .score-text {
      position: relative;
      z-index: 10;
      font-size: 42px;
      font-weight: 900;
      color: #1DB954;
      line-height: 1;
    }
    .score-label {
      font-size: 14px;
      font-weight: 700;
      color: #B3B3B3;
      margin-top: 8px;
    }
    
    /* Info cards */
    .info-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .info-card {
      background: #181818;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }
    .info-card-label {
      font-size: 12px;
      font-weight: 700;
      color: #B3B3B3;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .info-card-value {
      font-size: 24px;
      font-weight: 900;
      color: #FFFFFF;
    }
    
    /* Section title */
    .section-title {
      font-size: 16px;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 12px;
    }
    
    /* Subject progress */
    .subjects-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .subject-item {
      background: #181818;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .subject-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .subject-name {
      font-size: 14px;
      font-weight: 700;
      color: #FFFFFF;
    }
    .subject-score {
      font-size: 13px;
      font-weight: 800;
      color: #1DB954;
    }
    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #1DB954 0%, #1ed760 100%);
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    
    /* Points section */
    .points-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .points-col {
      background: #181818;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px;
    }
    .points-title {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .points-title.strong {
      color: #1DB954;
    }
    .points-title.weak {
      color: #F5C518;
    }
    .points-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .points-item {
      font-size: 12px;
      font-weight: 600;
      color: #B3B3B3;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .points-bullet {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    
    /* Account section */
    .account-section {
      background: #181818;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .account-title {
      font-size: 14px;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 12px;
    }
    .account-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .account-btn {
      background: none;
      border: none;
      color: #B3B3B3;
      font-size: 13px;
      font-weight: 600;
      text-align: left;
      padding: 8px 0;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s;
    }
    .account-btn:hover {
      color: #FFFFFF;
    }
    .account-btn.danger {
      color: #ef4444;
    }
    .account-btn.danger:hover {
      color: #f87171;
    }
    
    /* Bottom nav */
    .bottom-nav-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
      background: #121212;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .bottom-nav {
      max-width: 600px;
      margin: 0 auto;
      background: #181818;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 6px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 54px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 11px;
      font-weight: 800;
      padding: 6px 4px;
      transition: all 0.2s;
    }
    .nav-item.active {
      background: #1DB954;
      color: #FFFFFF;
    }
    .nav-item:not(.active) {
      color: #B3B3B3;
    }
    .nav-icon {
      width: 26px;
      height: 26px;
      border-radius: 9px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 900;
    }
    .nav-item.active .nav-icon {
      background: rgba(255,255,255,0.2);
    }
    .nav-item:not(.active) .nav-icon {
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Header -->
    <div class="header">
      <h1>📊 Ma progression</h1>
      <p id="headerSubtitle">Objectif : 15/20</p>
    </div>
    
    <!-- Content -->
    <div class="content">
      <!-- Score circle -->
      <div class="score-section">
        <div class="score-circle-wrap">
          <svg width="160" height="160">
            <circle cx="80" cy="80" r="70" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
            <circle id="progressCircle" cx="80" cy="80" r="70" fill="none" stroke="url(#gradient)" stroke-width="12" stroke-linecap="round" stroke-dasharray="440" stroke-dashoffset="440" style="transition: stroke-dashoffset 1s ease; transform: rotate(-90deg); transform-origin: center;"/>
            <defs>
              <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#1DB954;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#1ed760;stop-opacity:1" />
              </linearGradient>
            </defs>
          </svg>
          <div class="score-text" id="scoreText">0%</div>
        </div>
        <div class="score-label" id="scoreLabel">0/89 notions maîtrisées</div>
      </div>
      
      <!-- Info cards -->
      <div class="info-cards">
        <div class="info-card">
          <div class="info-card-label">Moyenne actuelle</div>
          <div class="info-card-value">12.5<span style="font-size: 16px; color: #B3B3B3;">/20</span></div>
        </div>
        <div class="info-card">
          <div class="info-card-label">Objectif</div>
          <div class="info-card-value" id="objectifValue">15<span style="font-size: 16px; color: #B3B3B3;">/20</span></div>
        </div>
      </div>
      
      <!-- Subjects -->
      <div class="section-title">Par matière</div>
      <div class="subjects-list" id="subjectsList">
        <!-- Subjects will be injected by JS -->
      </div>
      
      <!-- Points forts vs À travailler -->
      <div class="section-title">Analyse</div>
      <div class="points-grid">
        <div class="points-col">
          <div class="points-title strong">✨ Points forts</div>
          <div class="points-list">
            <div class="points-item">
              <span class="points-bullet"></span>
              <span>Anglais</span>
            </div>
            <div class="points-item">
              <span class="points-bullet"></span>
              <span>Mathématiques</span>
            </div>
            <div class="points-item">
              <span class="points-bullet"></span>
              <span>Sciences</span>
            </div>
          </div>
        </div>
        <div class="points-col">
          <div class="points-title weak">💡 À travailler</div>
          <div class="points-list">
            <div class="points-item">
              <span class="points-bullet"></span>
              <span>Histoire-Géo</span>
            </div>
            <div class="points-item">
              <span class="points-bullet"></span>
              <span>Français</span>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Account section -->
      <div class="account-section">
        <div class="account-title">👤 Mon compte</div>
        <div class="account-actions">
          <button class="account-btn" id="changePasswordBtn">Changer mon mot de passe</button>
          <button class="account-btn" id="contactSupportBtn">Contacter le support (contact@bravoo.com)</button>
          <button class="account-btn" id="logoutBtn">Me déconnecter</button>
          <button class="account-btn danger" id="deleteAccountBtn">Supprimer mon compte</button>
        </div>
      </div>
    </div>
    
    <!-- Bottom nav -->
    <div class="bottom-nav-wrap">
      <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">🎯</span>
          <span>Mon programme</span>
        </a>
        <a href="progression.html" class="nav-item active">
          <span class="nav-icon">📊</span>
          <span>Ma progression</span>
        </a>
      </div>
    </div>
  </div>
  
  <script>
    // Vérifier si l'utilisateur a payé
    const urlParams = new URLSearchParams(window.location.search);
    const justPaid = urlParams.get('paid') === 'true';
    const hasAccess = localStorage.getItem('bravoo_paid') === 'true';

    if (justPaid) {
      localStorage.setItem('bravoo_paid', 'true');
    } else if (!hasAccess) {
      // Pas d'accès → rediriger vers l'onboarding
      window.location.href = 'index.html';
    }
    
    // Get user data from localStorage (fallback Supabase later)
    const userData = JSON.parse(localStorage.getItem('bravoo_user') || '{}');
    const prenom = userData.prenom || 'toi';
    const preparation = userData.preparation || 'brevet';
    const matieresFortes = userData.matieresFortes || [];
    const matieresFaibles = userData.matieresFaibles || [];
    const moyenne = userData.moyenne || 12;
    const objectif = userData.objectif || 15;
    
    // Configuration des matières par préparation (copie depuis index.html)
    const MATIERES_CONFIG = {
      brevet: [
        { key: 'mathematiques', label: 'Mathématiques', emoji: '📐' },
        { key: 'francais', label: 'Français', emoji: '📖' },
        { key: 'histoire_geo_emc', label: 'Histoire-Géo/EMC', emoji: '🌍' },
        { key: 'sciences', label: 'Sciences', emoji: '🔬' },
        { key: 'anglais', label: 'Anglais', emoji: '🇬🇧' }
      ],
      bac: [
        { key: 'mathematiques', label: 'Mathématiques', emoji: '📐' },
        { key: 'francais', label: 'Français', emoji: '📖' },
        { key: 'philo', label: 'Philosophie', emoji: '🤔' },
        { key: 'histoire_geo', label: 'Histoire-Géo', emoji: '🗺️' },
        { key: 'anglais', label: 'Anglais', emoji: '🇬🇧' }
      ],
      code: [
        { key: 'code_route', label: 'Code de la route', emoji: '🚦' },
        { key: 'signalisation', label: 'Signalisation', emoji: '🚸' },
        { key: 'priorites', label: 'Règles de priorité', emoji: '⚠️' },
        { key: 'agglomeration', label: 'Conduite en agglomération', emoji: '🏙️' },
        { key: 'autoroute', label: 'Autoroute', emoji: '🛣️' }
      ],
      langue: [
        { key: 'grammaire', label: 'Grammaire', emoji: '📖' },
        { key: 'vocabulaire', label: 'Vocabulaire', emoji: '📚' },
        { key: 'comprehension_ecrite', label: 'Compréhension écrite', emoji: '📄' },
        { key: 'comprehension_orale', label: 'Compréhension orale', emoji: '🎧' },
        { key: 'expression', label: 'Expression', emoji: '✍️' }
      ],
      orthographe: [
        { key: 'orthographe', label: 'Orthographe', emoji: '✏️' },
        { key: 'grammaire', label: 'Grammaire', emoji: '📖' },
        { key: 'conjugaison', label: 'Conjugaison', emoji: '🔄' },
        { key: 'vocabulaire', label: 'Vocabulaire', emoji: '📚' }
      ],
      primaire: [
        { key: 'francais', label: 'Français', emoji: '📖' },
        { key: 'mathematiques', label: 'Mathématiques', emoji: '🔢' },
        { key: 'sciences', label: 'Sciences', emoji: '🔬' },
        { key: 'histoire_geo', label: 'Histoire-Géo', emoji: '🌍' }
      ]
    };
    
    // Obtenir les matières du parcours utilisateur
    const userMatieres = MATIERES_CONFIG[preparation] || MATIERES_CONFIG.brevet;
    
    // Update header
    const hasObjectif = objectif && !['code', 'langue', 'orthographe', 'concours'].includes(preparation);
    if (hasObjectif) {
      document.getElementById('headerSubtitle').textContent = `${prenom} — Objectif : ${objectif}/20`;
      document.getElementById('objectifValue').innerHTML = `${objectif}<span style="font-size: 16px; color: #B3B3B3;">/20</span>`;
    } else {
      document.getElementById('headerSubtitle').textContent = `${prenom}`;
      // Cacher la carte objectif si pas de moyenne/objectif
      const objectifCard = document.querySelector('.info-cards .info-card:nth-child(2)');
      if (objectifCard) objectifCard.style.display = 'none';
    }
    
    // Update moyenne actuelle
    if (moyenne) {
      document.querySelector('.info-card:nth-child(1) .info-card-value').innerHTML = `${moyenne}<span style="font-size: 16px; color: #B3B3B3;">/20</span>`;
    } else {
      document.querySelector('.info-card:nth-child(1) .info-card-label').textContent = 'NIVEAU';
      document.querySelector('.info-card:nth-child(1) .info-card-value').textContent = 'Débutant';
    }
    
    // Générer les matières dynamiquement
    const subjectsList = document.getElementById('subjectsList');
    
    // Scores factices pour chaque matière (progression aléatoire mais cohérente)
    const subjectScores = {};
    userMatieres.forEach((matiere, idx) => {
      const baseScore = 45 + Math.floor(Math.random() * 30);
      const isFort = matieresFortes.includes(matiere.key);
      const isFaible = matieresFaibles.includes(matiere.key);
      
      let score = baseScore;
      if (isFort) score = Math.min(baseScore + 15, 85);
      if (isFaible) score = Math.max(baseScore - 10, 35);
      
      subjectScores[matiere.key] = score;
      
      const subjectItem = document.createElement('div');
      subjectItem.className = 'subject-item';
      subjectItem.innerHTML = `
        <div class="subject-header">
          <div class="subject-name">${matiere.emoji} ${matiere.label}</div>
          <div class="subject-score">${score}%</div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" data-width="${score}"></div>
        </div>
      `;
      subjectsList.appendChild(subjectItem);
    });
    
    // Adapter les points forts et faibles
    const fortsContainer = document.querySelector('.points-col:nth-child(1) .points-list');
    const faiblesContainer = document.querySelector('.points-col:nth-child(2) .points-list');
    
    fortsContainer.innerHTML = '';
    faiblesContainer.innerHTML = '';
    
    const matieresFortesList = matieresFortes.map(k => userMatieres.find(m => m.key === k)).filter(Boolean);
    const matieresFaiblesList = matieresFaibles.map(k => userMatieres.find(m => m.key === k)).filter(Boolean);
    
    if (matieresFortesList.length > 0) {
      matieresFortesList.forEach(m => {
        const item = document.createElement('div');
        item.className = 'points-item';
        item.innerHTML = `<span class="points-bullet"></span><span>${m.label}</span>`;
        fortsContainer.appendChild(item);
      });
    } else {
      fortsContainer.innerHTML = '<div class="points-item" style="color: #727272;">Non défini</div>';
    }
    
    if (matieresFaiblesList.length > 0) {
      matieresFaiblesList.forEach(m => {
        const item = document.createElement('div');
        item.className = 'points-item';
        item.innerHTML = `<span class="points-bullet"></span><span>${m.label}</span>`;
        faiblesContainer.appendChild(item);
      });
    } else {
      faiblesContainer.innerHTML = '<div class="points-item" style="color: #727272;">Non défini</div>';
    }
    
    // Animate score circle
    const targetScore = 58;
    const notionsMaitrisees = 47;
    const totalNotions = 89;
    
    function animateScore() {
      const scoreText = document.getElementById('scoreText');
      const scoreLabel = document.getElementById('scoreLabel');
      const progressCircle = document.getElementById('progressCircle');
      
      // Animate percentage text
      let current = 0;
      const duration = 1800;
      const increment = targetScore / (duration / 16);
      
      const interval = setInterval(() => {
        current += increment;
        if (current >= targetScore) {
          current = targetScore;
          clearInterval(interval);
        }
        scoreText.textContent = Math.round(current) + '%';
      }, 16);
      
      // Animate circle
      const circumference = 2 * Math.PI * 70;
      const offset = circumference - (targetScore / 100) * circumference;
      setTimeout(() => {
        progressCircle.style.strokeDashoffset = offset;
      }, 100);
      
      // Update label
      scoreLabel.textContent = `${notionsMaitrisees}/${totalNotions} notions maîtrisées`;
    }
    
    // Animate progress bars
    function animateProgressBars() {
      const fills = document.querySelectorAll('.progress-fill');
      fills.forEach((fill, index) => {
        const width = fill.getAttribute('data-width');
        setTimeout(() => {
          fill.style.width = width + '%';
        }, 200 + (index * 100));
      });
    }
    
    // Account actions
    document.getElementById('changePasswordBtn').addEventListener('click', () => {
      alert('Cette fonctionnalité sera disponible très bientôt !');
    });
    
    document.getElementById('contactSupportBtn').addEventListener('click', () => {
      window.location.href = 'mailto:contact@bravoo.com';
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
      if (confirm('Es-tu sûr(e) de vouloir te déconnecter ?')) {
        localStorage.removeItem('userData');
        window.location.href = 'index.html';
      }
    });
    
    document.getElementById('deleteAccountBtn').addEventListener('click', () => {
      if (confirm('⚠️ Cette action est irréversible. Es-tu vraiment sûr(e) de vouloir supprimer ton compte ?')) {
        alert('Cette fonctionnalité sera disponible très bientôt !');
      }
    });
    
    // Init animations
    setTimeout(() => {
      animateScore();
      animateProgressBars();
    }, 100);
  </script>
</body>
</html>
