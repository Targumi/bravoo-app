<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bravoo — Ton coach personnel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ========================================
       RESET & BASE
       ======================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* BRANDING BRAVOO — IDENTIQUE AU SITE */
      --bg-page: #121212;
      --bg-surface: #181818;
      --bg-surface-hover: #282828;
      --primary: #1DB954;
      --primary-light: #1ED760;
      --primary-dark: #169C46;
      --accent: #F5C518;
      --text-primary: #FFFFFF;
      --text-secondary: #B3B3B3;
      --text-muted: #727272;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --green: #22c55e;
      --red: #ef4444;
      --font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-family);
      background: var(--bg-page);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100dvh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      position: relative;
      overflow: hidden;
    }

    /* Grain texture globale */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.02;
      z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='2.5' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' fill='%23FFF'/%3E%3C/svg%3E");
    }

    /* Particules flottantes en background */
    .hero-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0;
      box-shadow: 0 0 8px rgba(29, 185, 84, 0.6);
      animation: particleFloat 12s ease-in-out infinite;
    }

    @keyframes particleFloat {
      0% {
        transform: translate(0, 100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), -100px) scale(1);
        opacity: 0;
      }
    }

    .particle:nth-child(1) { left: 10%; animation-delay: 0s; --tx: 20px; }
    .particle:nth-child(2) { left: 20%; animation-delay: 1.5s; --tx: -30px; }
    .particle:nth-child(3) { left: 30%; animation-delay: 3s; --tx: 40px; }
    .particle:nth-child(4) { left: 40%; animation-delay: 4.5s; --tx: -20px; }
    .particle:nth-child(5) { left: 50%; animation-delay: 6s; --tx: 30px; }
    .particle:nth-child(6) { left: 60%; animation-delay: 7.5s; --tx: -40px; }
    .particle:nth-child(7) { left: 70%; animation-delay: 9s; --tx: 25px; }
    .particle:nth-child(8) { left: 80%; animation-delay: 10.5s; --tx: -35px; }

    /* ========================================
       LOGO
       ======================================== */
    .logo-bar {
      width: 100%;
      max-width: 460px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px 8px;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      text-decoration: none;
      color: var(--text-primary);
      overflow: visible;
    }

    .logo-brav {
      color: var(--text-primary);
    }

    .logo-oo {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      display: inline-block;
      font-size: 34px;
      vertical-align: baseline;
      line-height: 1;
      letter-spacing: -2px;
      font-weight: 900;
      overflow: visible;
      padding-right: 8px;
    }

    .logo-oo::after {
      content: '★';
      position: absolute;
      top: -12px;
      right: -4px;
      font-size: 14px;
      -webkit-text-fill-color: var(--accent);
      background: none;
      -webkit-background-clip: unset;
      line-height: 1;
      filter: drop-shadow(0 0 4px rgba(245, 197, 24, 0.5));
    }

    /* ========================================
       PROGRESS BAR
       ======================================== */
    .progress-bar-bg {
      width: 100%;
      max-width: 460px;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
      margin: 0 16px 12px 16px;
      overflow: hidden;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--accent));
      background-size: 200% 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
      animation: shimmer 2s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% {
        background-position: 0% center;
      }
      50% {
        background-position: 100% center;
      }
    }

    /* ========================================
       CARD
       ======================================== */
    .card {
      width: 100%;
      max-width: 460px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 10;
      transition: opacity 0.25s ease, transform 0.25s ease;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      margin: 0 16px 0 16px;
      max-height: calc(100dvh - 72px);
    }

    .card.fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    .card.fade-out {
      opacity: 0;
      transform: translateY(12px);
    }

    .card-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 16px 20px;
      -webkit-overflow-scrolling: touch;
    }

    .card-action {
      position: sticky;
      bottom: 0;
      z-index: 10;
      padding: 16px 20px 20px 20px;
      background: linear-gradient(to bottom, transparent 0%, var(--bg-surface) 20%);
      flex-shrink: 0;
    }

    .step-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .step-progress-text {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: none;
      letter-spacing: 0;
    }

    .heading {
      font-size: 22px;
      font-weight: 900;
      color: var(--text-primary);
      line-height: 1.2;
      margin: 0 0 20px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      margin: 0 0 16px;
      line-height: 1.6;
    }

    /* ========================================
       INPUT
       ======================================== */
    .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 2px solid var(--border-subtle);
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      background: var(--bg-page);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }

    .input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(29, 185, 84, 0.1);
    }

    .input-wrapper {
      position: relative;
    }

    .input-suffix {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-weight: 700;
      font-size: 16px;
      pointer-events: none;
    }

    /* ========================================
       BUTTON
       ======================================== */
    .btn {
      width: 100%;
      padding: 15px 24px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 16px;
      box-shadow: 0 8px 24px rgba(29, 185, 84, 0.3);
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      font-family: var(--font-family);
      animation: gentleGlow 3s ease-in-out infinite;
    }

    @keyframes gentleGlow {
      0%, 100% {
        box-shadow: 0 8px 24px rgba(29, 185, 84, 0.3);
      }
      50% {
        box-shadow: 0 8px 32px rgba(29, 185, 84, 0.4);
      }
    }

    .btn:hover:not(:disabled) {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(29, 185, 84, 0.4);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
      animation: none;
    }

    /* ========================================
       CHIPS / CARDS
       ======================================== */
    .chips-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      background: var(--bg-surface);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      font-weight: 700;
      font-size: 15px;
      color: var(--text-primary);
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      animation: bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .chip:nth-child(1) { animation-delay: 0s; }
    .chip:nth-child(2) { animation-delay: 0.05s; }
    .chip:nth-child(3) { animation-delay: 0.1s; }
    .chip:nth-child(4) { animation-delay: 0.15s; }
    .chip:nth-child(5) { animation-delay: 0.2s; }
    .chip:nth-child(6) { animation-delay: 0.25s; }
    .chip:nth-child(7) { animation-delay: 0.3s; }
    .chip:nth-child(8) { animation-delay: 0.35s; }
    .chip:nth-child(9) { animation-delay: 0.4s; }
    .chip:nth-child(10) { animation-delay: 0.45s; }
    .chip:nth-child(11) { animation-delay: 0.5s; }
    .chip:nth-child(12) { animation-delay: 0.55s; }

    @keyframes bounceIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .chip:hover {
      transform: translateY(-2px) scale(1.02);
      border-color: var(--primary);
      box-shadow: 0 8px 24px rgba(29, 185, 84, 0.2);
    }

    .chip.selected {
      border-color: var(--primary);
      background: rgba(29, 185, 84, 0.1);
      box-shadow: 0 0 0 4px rgba(29, 185, 84, 0.1);
    }

    .chip .emoji {
      font-size: 18px;
    }

    .chip .checkmark {
      margin-left: auto;
      color: var(--primary);
      font-weight: 900;
    }

    /* ========================================
       OBJECTIF CARDS
       ======================================== */
    .objectif-card {
      padding: 16px;
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      background: var(--bg-surface);
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .objectif-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(245, 197, 24, 0.2);
    }

    .objectif-card.selected {
      border-color: var(--accent);
      background: rgba(245, 197, 24, 0.1);
      box-shadow: 0 0 0 4px rgba(245, 197, 24, 0.1);
    }

    .objectif-card .label {
      font-weight: 800;
      font-size: 15px;
      color: var(--text-primary);
    }

    .objectif-card .value {
      font-size: 24px;
      font-weight: 900;
      color: var(--accent);
      margin-top: 4px;
    }

    /* ========================================
       LOADING
       ======================================== */
    .loading-container {
      text-align: center;
      padding: 32px 0;
    }

    .spinner {
      width: 56px;
      height: 56px;
      border: 4px solid var(--border-subtle);
      border-top-color: var(--primary);
      border-radius: 50%;
      margin: 0 auto 24px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-msg {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 60px;
      padding: 0 8px;
      animation: fadeInUp 0.5s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========================================
       QUIZ
       ======================================== */
    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .quiz-badge {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-primary);
      background: var(--primary);
      padding: 4px 10px;
      border-radius: 999px;
    }

    .quiz-choices {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .quiz-choice {
      padding: 13px 16px;
      border-radius: 14px;
      border: 2px solid var(--border-subtle);
      background: var(--bg-surface);
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-primary);
      text-align: left;
      display: flex;
      align-items: center;
    }

    .quiz-choice:hover {
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .quiz-choice.selected {
      border-color: var(--primary);
      background: rgba(29, 185, 84, 0.1);
    }

    .quiz-choice.correct {
      border-color: var(--green);
      background: rgba(34, 197, 94, 0.15);
      color: #FFFFFF;
    }

    .quiz-choice.wrong {
      border-color: var(--red);
      background: rgba(239, 68, 68, 0.15);
      color: #FFFFFF;
    }

    .quiz-choice .letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 8px;
      background: rgba(29, 185, 84, 0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 900;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .quiz-choice.correct .letter {
      background: var(--green);
      color: var(--text-primary);
    }

    .quiz-choice.wrong .letter {
      background: var(--red);
      color: var(--text-primary);
    }

    .quiz-explanation {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.5;
      animation: fadeInUp 0.3s ease-out;
    }

    .quiz-explanation.correct {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3); color: #FFFFFF;
    }

    .quiz-explanation.wrong {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3); color: #FFFFFF;
    }

    .quiz-progress {
      margin-top: 20px;
      height: 4px;
      border-radius: 2px;
      background: var(--border-subtle);
      overflow: hidden;
    }

    .quiz-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ========================================
       RECAP APP
       ======================================== */
    .recap-score {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(29, 185, 84, 0.1);
      margin-bottom: 16px;
    }

    .recap-score .percent {
      font-size: 28px;
      font-weight: 900;
      color: var(--primary);
    }

    .recap-score .label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .recap-features {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 16px;
      margin-top: 24px;
    }

    .recap-feature {
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0;
      transform: translateX(-20px);
      animation: slideInLeft 0.5s ease-out forwards;
    }

    .recap-feature:nth-child(1) { animation-delay: 0.1s; }
    .recap-feature:nth-child(2) { animation-delay: 0.25s; }
    .recap-feature:nth-child(3) { animation-delay: 0.4s; }
    .recap-feature:nth-child(4) { animation-delay: 0.55s; }

    @keyframes slideInLeft {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .recap-feature-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(29, 185, 84, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      animation: iconPulse 2s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    .recap-feature-text .title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .recap-feature-text .desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* ========================================
       PAYWALL
       ======================================== */
    .paywall-hero {
      text-align: center;
      margin-bottom: 24px;
    }

    .paywall-hero .emoji {
      font-size: 48px;
      margin-bottom: 12px;
      animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }

    .paywall-hero .title {
      font-size: 24px;
      font-weight: 900;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .paywall-summary {
      padding: 18px;
      border-radius: 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .paywall-summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .paywall-summary-row:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .paywall-summary-row .key {
      color: var(--text-secondary);
      font-weight: 600;
    }

    .paywall-summary-row .value {
      color: var(--text-primary);
      font-weight: 800;
    }

    .paywall-benefits {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .paywall-benefit {
      padding: 12px;
      border-radius: 12px;
      background: rgba(29, 185, 84, 0.05);
      border: 1px solid var(--border-subtle);
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .paywall-benefit .icon {
      font-size: 20px;
      display: block;
      margin-bottom: 6px;
    }

    .paywall-stars {
      text-align: center;
      font-size: 20px;
      color: var(--accent);
      margin-bottom: 8px;
      filter: drop-shadow(0 0 4px rgba(245, 197, 24, 0.5));
    }

    .paywall-rating {
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .paywall-testimonial {
      padding: 16px;
      border-radius: 14px;
      background: rgba(245, 197, 24, 0.05);
      border: 1px solid var(--border-subtle);
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.6;
      font-style: italic;
    }

    .paywall-testimonial .author {
      font-style: normal;
      font-weight: 700;
      color: var(--text-secondary);
      margin-top: 8px;
      font-size: 13px;
    }

    .paywall-offer {
      padding: 20px;
      border-radius: 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      margin-bottom: 20px;
      text-align: center;
    }

    .paywall-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--red), #ff6b6b);
      color: var(--text-primary);
      font-size: 11px;
      font-weight: 800;
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      animation: pulse 2s ease-in-out infinite;
    }

    function getQuizQuestions() {
      const classe = state.classe;
      let pool = [];

      if (classe === 'primaire') {
        pool = ALL_QUIZ_QUESTIONS.primaire;
      } else if (['6eme', '5eme', '4eme', '3eme'].includes(classe)) {
        pool = ALL_QUIZ_QUESTIONS.college;
      } else if (['2nde', '1ere', 'terminale'].includes(classe)) {
        pool = ALL_QUIZ_QUESTIONS.lycee;
      } else {
        pool = ALL_QUIZ_QUESTIONS.superieur;
      }

      // Sélectionner 6-8 questions aléatoires
      const count = Math.floor(Math.random() * 3) + 6; // 6, 7 ou 8
      const shuffled = pool.sort(() => Math.random() - 0.5);
      return shuffled.slice(0, Math.min(count, pool.length));
    }

    let currentStepIndex = 0;

      prenom: '',
      classe: '',
      moyenne: null,
      matieresFortes: [],

      quizQuestions: [],
      quizAnswers: {},
      email: '',
      password: ''
    };

    // ========================================
    // NAVIGATION
    // ========================================
    function goToStep(index) {
      const card = document.getElementById('card');
      card.classList.remove('fade-in');
      card.classList.add('fade-out');

      setTimeout(() => {
        currentStepIndex = index;
        updateProgress();
        renderStep();
        card.classList.remove('fade-out');
        card.classList.add('fade-in');
      }, 250);
    }

    function goNext() {
      if (currentStepIndex < STEPS.length - 1) {
        goToStep(currentStepIndex + 1);
      }
    }

    function updateProgress() {
      const percent = ((currentStepIndex + 1) / STEPS.length) * 100;
      document.getElementById('progressBar').style.width = percent + '%';
    }

    // ========================================
    // RENDER
    // ========================================
    function renderStep() {
      const step = STEPS[currentStepIndex];
      const card = document.getElementById('card');

      switch (step) {
        case 'prenom':
          card.innerHTML = `

            continueBtn.disabled = !state.prenom;

          prenomInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && state.prenom) {
              showConfetti();
              goNext();
            }
          });
          continueBtn.addEventListener('click', () => {
            showConfetti();
            goNext();
          });
          if (state.prenom) continueBtn.disabled = false;
          break;

    // ========================================
    // QUIZ
    // ========================================
    let currentQuizIndex = 0;
    let selectedAnswer = null;
    let showCorrection = false;

    function renderQuiz() {
      if (currentQuizIndex >= state.quizQuestions.length) {
        goNext();
        return;
      }

      const q = state.quizQuestions[currentQuizIndex];
      const card = document.getElementById('card');

      card.innerHTML = `
        <div class="card-content">
          <div class="quiz-header">
            <div class="step-label" style="margin-bottom: 0;">Question ${currentQuizIndex + 1}/${state.quizQuestions.length}</div>
            <div class="quiz-badge">${q.subject}</div>
          </div>
          <h2 class="heading" style="font-size: 17px;">${q.prompt}</h2>
          <div class="quiz-choices" id="quizChoices"></div>
          <div id="quizExplanation"></div>
          <div class="quiz-progress">
            <div class="quiz-progress-fill" style="width: ${((currentQuizIndex + 1) / state.quizQuestions.length) * 100}%;"></div>
          </div>
        </div>
      `;

      const choicesDiv = document.getElementById('quizChoices');
      const explanationDiv = document.getElementById('quizExplanation');

      q.choices.forEach((choice, idx) => {
        const choiceDiv = document.createElement('div');
        let className = 'quiz-choice';
        if (showCorrection) {
          if (idx === q.correctAnswerIndex) className += ' correct';
          else if (idx === selectedAnswer) className += ' wrong';
        } else if (idx === selectedAnswer) {
          className += ' selected';
        }

        choiceDiv.className = className;
        choiceDiv.innerHTML = `<span class="letter">${String.fromCharCode(65 + idx)}</span>${choice}`;

        if (!showCorrection) {
          choiceDiv.addEventListener('click', () => {
            selectedAnswer = idx;
            showCorrection = true;
            state.quizAnswers[q.id] = idx;
            renderQuiz();

            setTimeout(() => {
              showCorrection = false;
              selectedAnswer = null;
              currentQuizIndex++;
              renderQuiz();
            }, 2400);
          });
        }

        choicesDiv.appendChild(choiceDiv);
      });

      if (showCorrection && q.explanation) {
        const expDiv = document.createElement('div');
        expDiv.className = 'quiz-explanation ' + (selectedAnswer === q.correctAnswerIndex ? 'correct' : 'wrong');
        expDiv.textContent = (selectedAnswer === q.correctAnswerIndex ? 'Bien joué ! ' : 'Pas tout à fait. ') + q.explanation;
        explanationDiv.appendChild(expDiv);
      }
    }

    // ========================================
    // LOADING PROFILE
    // ========================================
    function renderLoadingProfile() {
      const card = document.getElementById('card');
      
      card.innerHTML = `
        <div class="card-content">
          <div class="profile-loading-container">
            <div class="circular-progress">
              <svg viewBox="0 0 120 120">
                <circle class="circle-bg" cx="60" cy="60" r="52"></circle>
                <circle class="circle-progress" cx="60" cy="60" r="52" id="progressCircle" 
                  stroke-dasharray="327" stroke-dashoffset="327"></circle>
                <text x="60" y="70" text-anchor="middle" class="percent-text" id="progressPercent">0%</text>
              </svg>
            </div>
            <div class="loading-phase" id="loadingPhase"></div>
            <div class="profile-results" id="profileResults"></div>
          </div>
        </div>
      `;

      const phases = [
        { range: [0, 15], text: 'Analyse de tes réponses...', icon: '🔍' },
        { range: [15, 30], text: 'Identification de tes lacunes...', icon: '📊' },
        { range: [30, 45], text: 'Évaluation de ton niveau par matière...', icon: '📐' },
        { range: [45, 60], text: 'Calcul de ton potentiel de progression...', icon: '📈' },
        { range: [60, 75], text: 'Création de ton programme personnalisé...', icon: '🧠' },
        { range: [75, 90], text: 'Sélection des exercices adaptés...', icon: '✨' },
        { range: [90, 100], text: 'Finalisation de ton espace...', icon: '✅' }
      ];

      const userSubjects = state.matieresFaibles.length > 0 
        ? state.matieresFaibles.map(k => SUBJECTS.find(s => s.key === k)?.label || k)
        : ['Mathématiques', 'Français', 'Histoire-Géo'];

      const fakeResults = [];
      userSubjects.forEach((subject, i) => {
        const baseLevel = 50 + Math.floor(Math.random() * 20);
        const potential = baseLevel + 15 + Math.floor(Math.random() * 10);
        fakeResults.push({
          text: `${subject} : Niveau ${baseLevel}% → Potentiel ${potential}%`,
          delay: (i + 1) * 1100
        });
      });

      let progress = 0;
      let currentPhaseIndex = 0;
      const progressCircle = document.getElementById('progressCircle');
      const progressPercent = document.getElementById('progressPercent');
      const loadingPhase = document.getElementById('loadingPhase');
      const profileResults = document.getElementById('profileResults');

      function updatePhase() {
        const phase = phases[currentPhaseIndex];
        if (phase) {
          loadingPhase.innerHTML = `<span class="icon">${phase.icon}</span>${phase.text}`;
        }
      }

      updatePhase();

      const totalDuration = 7500;
      const intervalMs = 75;
      const steps = totalDuration / intervalMs;
      const progressPerStep = 100 / steps;

      const progressInterval = setInterval(() => {
        progress += progressPerStep;
        if (progress > 100) progress = 100;

        const percent = Math.floor(progress);
        progressPercent.textContent = percent + '%';
        const circumference = 327;
        const offset = circumference - (progress / 100) * circumference;
        progressCircle.style.strokeDashoffset = offset;

        // Changer de phase
        for (let i = 0; i < phases.length; i++) {
          if (progress >= phases[i].range[0] && progress < phases[i].range[1]) {
            if (currentPhaseIndex !== i) {
              currentPhaseIndex = i;
              updatePhase();
            }
            break;
          }
        }

        if (progress >= 100) {
          clearInterval(progressInterval);
          setTimeout(goNext, 1000);
        }
      }, intervalMs);

      // Afficher les faux résultats
      fakeResults.forEach((result, idx) => {
        setTimeout(() => {
          const div = document.createElement('div');
          div.className = 'profile-result';
          div.innerHTML = `<span>${result.text}</span><span class="check">✓</span>`;
          profileResults.appendChild(div);
          // Auto-scroll
          profileResults.scrollTop = profileResults.scrollHeight;
        }, result.delay);
      });
    }

        return [
          { label: 'Remonter à 10 et sécuriser le brevet', value: 10 },
          { label: 'Viser 12-13 et décrocher une mention', value: 12 },
          { label: 'Tout casser et viser 15+', value: 15 }
        ];
      }
      if (moyenne < 11) {
        return [
          { label: 'Consolider et monter à 12', value: 12 },
          { label: 'Progresser sérieusement pour atteindre 14-15', value: 14 },
          { label: 'Tout casser et viser la mention Très Bien (16+)', value: 16 }
        ];
      }
      if (moyenne < 14) {
        return [
          { label: 'Maintenir le cap et sécuriser la mention', value: Math.ceil(moyenne) + 1 },
          { label: 'S\'améliorer et viser 15-16', value: 15 },
          { label: 'Viser l\'excellence : 18+', value: 18 }
        ];
      }
      return [
        { label: 'Maintenir ton excellent niveau', value: Math.ceil(moyenne) },
        { label: 'Viser 17-18 et la mention Très Bien', value: 17 },
        { label: 'Objectif 19-20 : le sans-faute', value: 19 }
      ];
    }

    function getQuizResults() {
      let correct = 0;
      const total = state.quizQuestions.length;
      state.quizQuestions.forEach(q => {
        if (state.quizAnswers[q.id] === q.correctAnswerIndex) correct++;
      });
      return { correct, total, percent: Math.round((correct / total) * 100) };
    }

    function showConfetti() {
      const container = document.getElementById('confetti');
      container.innerHTML = '';
      const colors = ['#1DB954', '#F5C518', '#1ED760', '#FF6B6B'];
      for (let i = 0; i < 30; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        container.appendChild(confetti);
      }
      setTimeout(() => {
        container.innerHTML = '';
      }, 3000);
    }

    // ========================================
    // INIT
    // ========================================
    updateProgress();
    renderStep();
  </script>
</body>
</html>
